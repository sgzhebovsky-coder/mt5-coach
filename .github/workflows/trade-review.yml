name: MT5 Trade Review

on:
  schedule:
    # every 15 minutes, but not on round minutes (00/15/30/45) — GitHub warns those are the busiest
    - cron: '4,19,34,49 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python trade_review.py
        env:
          METAAPI_TOKEN: ${{ secrets.METAAPI_TOKEN }}
          METAAPI_ACCOUNT_ID: ${{ secrets.METAAPI_ACCOUNT_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

      - name: Save state.json back to the repository
        run: |
          git config user.name "trade-review-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update state"
          git push
